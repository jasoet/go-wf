version: '3'

vars:
  N: "nix develop -c"
  PODMAN_SOCKET:
    sh: |
      if command -v podman &> /dev/null; then
        podman machine inspect --format '{{"{{"}}.ConnectionInfo.PodmanSocket.Path{{"}}"}}' 2>/dev/null || echo ""
      fi
  CONTAINER_HOST:
    sh: |
      # Use existing DOCKER_HOST if set
      if [ -n "$DOCKER_HOST" ]; then
        echo "$DOCKER_HOST"
        exit 0
      fi
      # Try native Docker
      if command -v docker &> /dev/null && docker ps &> /dev/null 2>&1; then
        echo ""
        exit 0
      fi
      # Try Podman socket
      if command -v podman &> /dev/null; then
        SOCKET=$(podman machine inspect --format '{{"{{"}}.ConnectionInfo.PodmanSocket.Path{{"}}"}}' 2>/dev/null || echo "")
        if [ -n "$SOCKET" ] && [ -S "$SOCKET" ]; then
          echo "unix://$SOCKET"
          exit 0
        fi
      fi
      echo ""
  COMPOSE_CMD:
    sh: |
      # Docker Compose V2 plugin (OrbStack, Docker Desktop)
      if command -v docker &> /dev/null && docker info &> /dev/null 2>&1 && docker compose version &> /dev/null 2>&1; then
        echo "docker compose"
        exit 0
      fi
      # podman-compose
      if command -v podman-compose &> /dev/null && command -v podman &> /dev/null && podman info &> /dev/null 2>&1; then
        echo "podman-compose"
        exit 0
      fi
      # Legacy docker-compose standalone
      if command -v docker-compose &> /dev/null && command -v docker &> /dev/null && docker info &> /dev/null 2>&1; then
        echo "docker-compose"
        exit 0
      fi
      echo ""

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  test:
    desc: Run all tests (unit + integration) with coverage - container engine required
    silent: true
    deps: [container:check]
    env:
      DOCKER_HOST: '{{.CONTAINER_HOST}}'
      TESTCONTAINERS_RYUK_DISABLED: '{{if .CONTAINER_HOST}}true{{end}}'
    cmds:
      - mkdir -p output
      - "{{.N}} go test -race -count=1 -coverprofile=output/coverage.out -covermode=atomic -tags=integration -timeout=15m ./..."
      - "{{.N}} go tool cover -html=output/coverage.out -o output/coverage.html"
      - "{{.N}} go tool cover -func=output/coverage.out | grep total"
      - 'echo "✓ Coverage: output/coverage.html"'

  test:unit:
    desc: Run unit tests only (fast, no container engine required)
    silent: true
    cmds:
      - mkdir -p output
      - "{{.N}} go test -race -count=1 -coverprofile=output/coverage-unit.out -covermode=atomic ./..."
      - "{{.N}} go tool cover -html=output/coverage-unit.out -o output/coverage-unit.html"
      - 'echo "✓ Unit Coverage: output/coverage-unit.html"'

  test:integration:
    desc: Run integration tests only (container engine required)
    silent: true
    deps: [container:check]
    env:
      DOCKER_HOST: '{{.CONTAINER_HOST}}'
      TESTCONTAINERS_RYUK_DISABLED: '{{if .CONTAINER_HOST}}true{{end}}'
    cmds:
      - mkdir -p output
      - "{{.N}} go test -race -count=1 -coverprofile=output/coverage-integration.out -covermode=atomic -tags=integration -timeout=15m ./..."
      - "{{.N}} go tool cover -html=output/coverage-integration.out -o output/coverage-integration.html"
      - "{{.N}} go tool cover -func=output/coverage-integration.out | grep total"
      - 'echo "✓ Integration Coverage: output/coverage-integration.html"'

  container:check:
    desc: Check Docker or Podman availability and daemon status
    silent: true
    cmds:
      - |
        COMPOSE_CMD="{{.COMPOSE_CMD}}"

        # 1. If DOCKER_HOST is already set by user, trust it
        if [ -n "$DOCKER_HOST" ]; then
          echo "✅ DOCKER_HOST is set: $DOCKER_HOST"
          [ -n "$COMPOSE_CMD" ] && echo "   Compose: $COMPOSE_CMD"
          exit 0
        fi

        # 2. Try native Docker
        if command -v docker &> /dev/null && docker ps &> /dev/null 2>&1; then
          echo "✅ Docker is available and running"
          docker --version
          [ -n "$COMPOSE_CMD" ] && echo "   Compose: $COMPOSE_CMD"
          exit 0
        fi

        # 3. Try Podman via detected socket
        CONTAINER_HOST="{{.CONTAINER_HOST}}"
        if [ -n "$CONTAINER_HOST" ]; then
          echo "✅ Podman is available"
          podman --version
          echo "   Container host: $CONTAINER_HOST"
          [ -n "$COMPOSE_CMD" ] && echo "   Compose: $COMPOSE_CMD"
          exit 0
        fi

        # 4. Podman is installed but socket not found
        if command -v podman &> /dev/null; then
          echo "❌ Podman is installed but no running machine detected"
          echo "   Start with: podman machine start"
          exit 1
        fi

        echo "❌ Neither Docker nor Podman found"
        echo "   Install Docker/OrbStack or Podman and try again"
        exit 1

  lint:
    desc: Run golangci-lint
    silent: true
    cmds:
      - "{{.N}} golangci-lint run ./..."

  check:
    desc: Run all checks (test + lint)
    silent: true
    cmds:
      - task: test
      - task: lint

  tools:
    desc: Install development tools
    silent: true
    cmds:
      - "{{.N}} go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest"
      - "{{.N}} go install mvdan.cc/gofumpt@latest"
      - "{{.N}} go install golang.org/x/tools/cmd/goimports@latest"
      - echo "✓ Tools installed"

  fmt:
    desc: Format all Go files (goimports + gofumpt)
    cmds:
      - "{{.N}} goimports -local \"github.com/jasoet/go-wf\" -w ."
      - "{{.N}} gofumpt -l -w ."

  ci:test:
    desc: Run unit tests for CI (no coverage HTML)
    silent: true
    cmds:
      - "{{.N}} go test -race -count=1 ./..."

  ci:lint:
    desc: Run golangci-lint for CI
    silent: true
    cmds:
      - "{{.N}} golangci-lint run ./..."

  ci:check:
    desc: Run all CI checks (test + lint)
    silent: true
    cmds:
      - task: ci:test
      - task: ci:lint

  release:
    desc: Run semantic-release (CI only)
    silent: true
    cmds:
      - bunx semantic-release

  release:proxy-warmup:
    desc: Warm Go module proxy with latest tag
    silent: true
    cmds:
      - |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -n "$LATEST_TAG" ]; then
          echo "Warming Go proxy for github.com/jasoet/go-wf@${LATEST_TAG}"
          GOPROXY=https://proxy.golang.org GO111MODULE=on go list -m "github.com/jasoet/go-wf@${LATEST_TAG}" || true
        fi

  test:pkg:
    desc: "Run unit tests for a specific package (usage: task test:pkg -- ./function/workflow/...)"
    silent: true
    cmds:
      - "{{.N}} go test -race -count=1 -v {{.CLI_ARGS}}"

  test:run:
    desc: "Run a specific test by name (usage: task test:run -- -run TestName ./package/...)"
    silent: true
    cmds:
      - "{{.N}} go test -race -count=1 -v {{.CLI_ARGS}}"

  test:coverage:
    desc: "Show coverage for a specific package (usage: task test:coverage -- ./function/workflow/...)"
    silent: true
    cmds:
      - "{{.N}} go test -race -count=1 -coverprofile=/tmp/pkg-coverage.out -covermode=atomic {{.CLI_ARGS}}"
      - "{{.N}} go tool cover -func=/tmp/pkg-coverage.out | grep total"

  example:container:
    desc: "Run a container example (usage: task example:container -- basic.go)"
    silent: true
    dir: examples/container
    cmds:
      - "{{.N}} go run -tags example {{.CLI_ARGS}}"

  example:container:worker:
    desc: Start the container example worker (listens on container-tasks queue)
    silent: true
    dir: examples/container/worker
    cmds:
      - "{{.N}} go run -tags example main.go"

  example:function:
    desc: "Run a function example (usage: task example:function -- basic.go)"
    silent: true
    dir: examples/function
    cmds:
      - "{{.N}} go run -tags example {{.CLI_ARGS}}"

  example:datasync:
    desc: "Run a datasync example (usage: task example:datasync -- basic.go)"
    silent: true
    dir: examples/datasync
    cmds:
      - "{{.N}} go run -tags example {{.CLI_ARGS}}"

  example:datasync:worker:
    desc: Start the datasync example worker (listens on sync-* task queues)
    silent: true
    dir: examples/datasync/worker
    cmds:
      - "{{.N}} go run -tags example main.go"

  example:list:
    desc: List all available example files
    silent: true
    cmds:
      - |
        echo "Container examples (task example:container -- <file>):"
        for f in examples/container/*.go; do
          echo "  $(basename $f)"
        done
        echo ""
        echo "Container worker (task example:container:worker):"
        echo "  worker/main.go"
        echo ""
        echo "Function examples (task example:function -- <file>):"
        for f in examples/function/*.go; do
          echo "  $(basename $f)"
        done
        echo ""
        echo "DataSync examples (task example:datasync -- <file>):"
        for f in examples/datasync/*.go; do
          echo "  $(basename $f)"
        done
        echo ""
        echo "DataSync worker (task example:datasync:worker):"
        echo "  worker/main.go"

  demo:
    desc: Start Temporal, run all examples, watch at http://localhost:8233
    silent: true
    env:
      DOCKER_HOST: '{{.CONTAINER_HOST}}'
      TESTCONTAINERS_RYUK_DISABLED: '{{if .CONTAINER_HOST}}true{{end}}'
    cmds:
      - |
        set -e

        # Cleanup function
        cleanup() {
          echo ""
          echo "🧹 Cleaning up..."
          [ -n "$WORKER_PID" ] && kill $WORKER_PID 2>/dev/null && echo "  Stopped container worker (PID $WORKER_PID)"
          [ -n "$TEMPORAL_PID" ] && kill $TEMPORAL_PID 2>/dev/null && echo "  Stopped Temporal server (PID $TEMPORAL_PID)"
          exit 0
        }
        trap cleanup EXIT

        # 1. Start Temporal dev server
        echo "🚀 Starting Temporal dev server..."
        temporal server start-dev --ip 127.0.0.1 --log-format json --log-level error > /dev/null 2>&1 &
        TEMPORAL_PID=$!
        echo "  Temporal PID: $TEMPORAL_PID"

        # Wait for Temporal to be ready
        echo "  Waiting for Temporal (port 7233)..."
        for i in $(seq 1 30); do
          if nc -z localhost 7233 2>/dev/null; then
            echo "  ✅ Temporal ready"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "  ❌ Temporal failed to start"
            exit 1
          fi
          sleep 1
        done

        echo "  📊 Temporal UI: http://localhost:8233"
        echo ""

        # 2. Start container worker
        echo "🔧 Starting container worker..."
        cd examples/container/worker && go run -tags example main.go > /dev/null 2>&1 &
        WORKER_PID=$!
        cd - > /dev/null
        echo "  Worker PID: $WORKER_PID"
        sleep 2
        echo ""

        # 3. Run function examples (self-contained, no container engine needed)
        echo "═══════════════════════════════════════"
        echo "  FUNCTION EXAMPLES"
        echo "═══════════════════════════════════════"
        for f in basic.go pipeline.go parallel.go loop.go builder.go; do
          echo ""
          echo "▶ function/$f"
          echo "---"
          (cd examples/function && go run -tags example "$f") || echo "  ⚠ $f exited with error"
          echo ""
        done

        # 4. Run standalone container examples (have embedded workers)
        echo "═══════════════════════════════════════"
        echo "  CONTAINER EXAMPLES (standalone)"
        echo "═══════════════════════════════════════"
        for f in basic.go pipeline.go parallel.go builder.go; do
          echo ""
          echo "▶ container/$f"
          echo "---"
          (cd examples/container && go run -tags example "$f") || echo "  ⚠ $f exited with error"
          echo ""
        done

        # 5. Run worker-dependent container examples (use external worker)
        echo "═══════════════════════════════════════"
        echo "  CONTAINER EXAMPLES (worker-dependent)"
        echo "═══════════════════════════════════════"
        for f in advanced.go builder-advanced.go dag.go data-passing.go loop.go operations.go patterns-demo.go; do
          echo ""
          echo "▶ container/$f"
          echo "---"
          (cd examples/container && go run -tags example "$f") || echo "  ⚠ $f exited with error"
          echo ""
        done

        echo "═══════════════════════════════════════"
        echo "  ✅ All examples completed!"
        echo "  📊 Review workflows at http://localhost:8233"
        echo "═══════════════════════════════════════"

  demo:start:
    desc: Start Temporal dev server + container worker in background (use demo:stop to clean up)
    silent: true
    env:
      DOCKER_HOST: '{{.CONTAINER_HOST}}'
      TESTCONTAINERS_RYUK_DISABLED: '{{if .CONTAINER_HOST}}true{{end}}'
    cmds:
      - |
        set -e
        PIDFILE="/tmp/go-wf-demo.pids"

        # Check if already running
        if [ -f "$PIDFILE" ]; then
          echo "⚠ Demo already running (PID file exists). Run 'task demo:stop' first."
          exit 1
        fi

        # 1. Start Temporal dev server
        echo "🚀 Starting Temporal dev server..."
        temporal server start-dev --ip 127.0.0.1 --log-format json --log-level error > /dev/null 2>&1 &
        TEMPORAL_PID=$!
        echo "  Temporal PID: $TEMPORAL_PID"

        # Wait for Temporal to be ready
        echo "  Waiting for Temporal (port 7233)..."
        for i in $(seq 1 30); do
          if nc -z localhost 7233 2>/dev/null; then
            echo "  ✅ Temporal ready"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "  ❌ Temporal failed to start"
            kill $TEMPORAL_PID 2>/dev/null
            exit 1
          fi
          sleep 1
        done

        # 2. Start container worker
        echo "🔧 Starting container worker..."
        cd examples/container/worker && go run -tags example main.go > /dev/null 2>&1 &
        WORKER_PID=$!
        cd - > /dev/null
        echo "  Worker PID: $WORKER_PID"
        sleep 2

        # Save PIDs
        echo "$TEMPORAL_PID $WORKER_PID" > "$PIDFILE"

        echo ""
        echo "✅ Demo environment ready!"
        echo "  📊 Temporal UI: http://localhost:8233"
        echo ""
        echo "Run examples with:"
        echo "  task example:function -- basic.go"
        echo "  task example:container -- basic.go"
        echo "  task example:list"
        echo ""
        echo "Stop with: task demo:stop"

  demo:stop:
    desc: Stop Temporal dev server + container worker started by demo:start
    silent: true
    cmds:
      - |
        PIDFILE="/tmp/go-wf-demo.pids"

        if [ ! -f "$PIDFILE" ]; then
          echo "No demo environment running (no PID file found)."
          exit 0
        fi

        read TEMPORAL_PID WORKER_PID < "$PIDFILE"

        echo "🧹 Stopping demo environment..."
        [ -n "$WORKER_PID" ] && kill $WORKER_PID 2>/dev/null && echo "  Stopped container worker (PID $WORKER_PID)"
        [ -n "$TEMPORAL_PID" ] && kill $TEMPORAL_PID 2>/dev/null && echo "  Stopped Temporal server (PID $TEMPORAL_PID)"

        rm -f "$PIDFILE"
        echo "✅ Demo environment stopped."

  local:up:
    desc: Start local environment (infrastructure + function worker + datasync worker + trigger)
    silent: true
    preconditions:
      - sh: '[ -n "{{.COMPOSE_CMD}}" ]'
        msg: "No compose tool found. Install 'docker compose' (Docker/OrbStack) or 'podman-compose' (Podman) and ensure the runtime is running."
    cmds:
      - '{{.COMPOSE_CMD}} up -d --build'
      - |
        echo ""
        echo "Local environment starting (with function worker and datasync worker)..."
        echo "  Temporal gRPC: localhost:${TEMPORAL_PORT:-7234}"
        echo "  Temporal UI:   http://localhost:${TEMPORAL_UI_PORT:-8234}"
        echo "  PostgreSQL:    localhost:${PG_PORT:-5433}"
        echo "  RustFS:        http://localhost:9001 (rustfsadmin/rustfsadmin)"
        echo ""
        echo "Override ports: PG_PORT=5433 TEMPORAL_PORT=7234 TEMPORAL_UI_PORT=8234 task local:up"
        echo "Use 'task local:logs' to follow logs"
        echo "Use 'task local:down' to stop"

  local:up:all:
    desc: Start all services including container worker (requires CONTAINER_SOCK env var)
    silent: true
    preconditions:
      - sh: '[ -n "{{.COMPOSE_CMD}}" ]'
        msg: "No compose tool found. Install 'docker compose' (Docker/OrbStack) or 'podman-compose' (Podman) and ensure the runtime is running."
    cmds:
      - '{{.COMPOSE_CMD}} up -d --build'
      - |
        echo ""
        echo "Local environment starting (with container worker)..."
        echo "  Temporal gRPC: localhost:${TEMPORAL_PORT:-7234}"
        echo "  Temporal UI:   http://localhost:${TEMPORAL_UI_PORT:-8234}"
        echo "  PostgreSQL:    localhost:${PG_PORT:-5433}"
        echo "  RustFS:        http://localhost:9001 (rustfsadmin/rustfsadmin)"
        echo ""
        echo "Use 'task local:logs' to follow logs"
        echo "Use 'task local:down' to stop"

  local:down:
    desc: Stop local environment
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} down'

  local:clean:
    desc: Stop local environment and remove volumes
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} down -v'

  local:build:
    desc: Build worker and trigger container images
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} build'

  local:logs:
    desc: Follow logs from all services
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} logs -f'

  local:trigger:
    desc: Submit all example workflows once
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} run --rm trigger run'

  local:schedule:
    desc: Create recurring workflow schedules
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} run --rm trigger schedule'

  local:schedule:clean:
    desc: Remove all workflow schedules
    silent: true
    cmds:
      - '{{.COMPOSE_CMD}} run --rm trigger clean'

  local:start:
    desc: Start local environment (alias for local:up)
    silent: true
    cmds:
      - task: local:up

  local:stop:
    desc: Stop local environment (alias for local:down)
    silent: true
    cmds:
      - task: local:down

  nix:check:
    desc: Verify Nix environment and all dev tools
    cmds:
      - "{{.N}} go version"
      - "{{.N}} golangci-lint --version"
      - "{{.N}} gofumpt --version"
      - "{{.N}} gosec --version"
      - "{{.N}} goimports -h 2>&1 | head -1"
      - "{{.N}} jq --version"

  nix:update:
    desc: Update Nix flake inputs to latest
    cmds:
      - nix flake update

  clean:
    desc: Clean build artifacts
    silent: true
    cmds:
      - rm -rf dist output
