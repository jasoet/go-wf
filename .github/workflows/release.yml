name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: [self-hosted, local, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Test
        run: nix develop --command task ci:test

  release:
    name: Release
    needs: test
    runs-on: [self-hosted, local, macOS, ARM64]
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install semantic-release
        run: nix develop --command bun install -g semantic-release @semantic-release/github conventional-changelog-conventionalcommits
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --command bunx semantic-release
      - name: Warm Go Proxy
        if: success()
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            MODULE=$(head -1 go.mod | awk '{print $2}')
            nix develop --command go list -m "${MODULE}@${LATEST_TAG}" || true
          fi
