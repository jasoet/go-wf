services:
  postgresql:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.26.2
    ports:
      - "127.0.0.1:7233:7233"
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname):7233"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 20

  temporal-ui:
    image: temporalio/ui:2.35.0
    ports:
      - "127.0.0.1:8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    depends_on:
      temporal:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-39-45Z
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  container-worker:
    build:
      context: .
      dockerfile: Containerfile
      target: container-worker
    user: "0"
    security_opt:
      - label=disable
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      temporal:
        condition: service_healthy
    profiles:
      - container

  function-worker:
    build:
      context: .
      dockerfile: Containerfile
      target: function-worker
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - artifact-data:/tmp/go-wf-artifacts
    depends_on:
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy

  trigger:
    build:
      context: .
      dockerfile: Containerfile
      target: trigger
    command: ["run-all"]
    environment:
      TEMPORAL_HOST_PORT: temporal:7233
    depends_on:
      function-worker:
        condition: service_started

volumes:
  postgresql-data:
  minio-data:
  artifact-data:
