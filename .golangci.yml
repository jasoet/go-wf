version: "2"
run:
  modules-download-mode: readonly
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - funlen
    - goconst
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 20
    godot:
      scope: declarations
      capital: false
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    lll:
      line-length: 190
      tab-width: 1
    misspell:
      locale: US
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: var-naming
          arguments:
            - - ID
              - URL
              - HTTP
              - API
              - JSON
              - XML
              - HTML
              - SQL
              - DB
              - gRPC
              - TCP
              - UDP
              - IP
              - UUID
              - URI
    staticcheck:
      checks:
        - all
        - -ST1000
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - goconst
          - gocyclo
          - gosec
          - lll
        path: _test\.go
      - linters:
          - errcheck
          - gosec
          - lll
        path: examples/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/jasoet/go-wf
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
